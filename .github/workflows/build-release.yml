name: Build and Release

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]

permissions:
  contents: write

jobs:
  build:
    name: Build macOS PKG
    runs-on: macos-15
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Compile 3rdparty Dependencies
        run: |
          cd 3rdparty
          make -f Makefile.ntfs3g

      - name: Compile and Package App
        run: |
          make pkg

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: NTFSMagic-pkg
          path: NTFSMagic.pkg

      - name: Create and Attach PKG to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: NTFSMagic.pkg
          name: NTFS Magic ${{ github.ref_name }}
          body: |
            ## NTFS Magic ${{ github.ref_name }}
            
            Modern, user-space, kext-less NTFS read-write driver for macOS 15+ (Sequoia) built on top of Apple's FSKit framework and utilizing `libntfs-3g`.

            ### 🚀 New features and enhancements in v0.2
            * **Dynamic Disk Size Reporting**: Resolves the hard-coded size reporting. The driver now dynamically queries the target NTFS volume parameters (sector/cluster size, total clusters, and free space) and reports them accurately to Finder and Disk Utility.
            * **High-Performance Inode Cache**: Introduces a thread-safe LRU inode cache (size 16) in the root helper daemon. This dramatically reduces disk wear and CPU overhead by keeping active files open (e.g., sequential writes now require exactly 1 open instead of hundreds).
            * **Coherent Directory Modifications**: Fixes the `ENOENT` directory lookup bug during file renames/creates. The daemon now immediately evicts parent directory inodes from the cache after modification, ensuring Finder always gets an up-to-date and consistent directory listing.
            * **File Synchronization (`sync`)**: Fully maps FSKit's `synchronize` protocol to flush dirty cache entries to disk (`NTFS_MSG_SYNC`).
            * **Automated CI/CD**: Pre-compiled package (`NTFSMagic.pkg`) attached automatically.
            
            ### ⚠️ Installation Notes
            Without a paid Apple Developer ID signature, macOS's security manager (`fskitd`) will reject loading the FSKit extension. To use this release system-wide:
            1. Boot into Recovery Mode and run `csrutil disable` to disable SIP.
            2. Install the `NTFSMagic.pkg` and open `/Applications/NTFSMagic.app` to register.
            
            Alternatively, you can run the helper daemon manually in CLI-only mode without disabling SIP:
            `sudo /Library/PrivilegedHelperTools/ntfsmagicd`
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
