name: Build and Release

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]

permissions:
  contents: write

jobs:
  build:
    name: Build macOS PKG
    runs-on: macos-15
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Compile 3rdparty Dependencies
        run: |
          cd 3rdparty
          make -f Makefile.ntfs3g

      - name: Compile and Package App
        run: |
          make pkg

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: NTFSMagic-pkg
          path: NTFSMagic.pkg

      - name: Create and Attach PKG to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: NTFSMagic.pkg
          name: NTFS Magic ${{ github.ref_name }}
          body: |
            ## NTFS Magic ${{ github.ref_name }}
            
            Modern, user-space, kext-less NTFS read-write driver for macOS 15+ (Sequoia) built on top of Apple's FSKit framework and utilizing `libntfs-3g`.

            ### 🚀 New features and enhancements in v0.3
            * **Multi-threaded Concurrency (R/W Locks)**: Spawns dedicated client threads in the daemon and replaces the global mutex with `pthread_rwlock_t`, enabling fully parallel read operations on the filesystem.
            * **Zero-copy POSIX Shared Memory**: Transfers file read/write buffers via a mapped memory file (`mmap`), entirely bypassing socket IPC serialization overhead for file data.
            * **Set-Associative Inode Cache**: Upgrades the cache from 16 to 1024 inodes using an O(1) set-associative (4-way) search to guarantee zero MFT thrashing for deep folder structures.
            * **Symbolic Links Support**: Fully implements NTFS symlink creation (`NTFS_MSG_SYMLINK`) and targets reading (`NTFS_MSG_READLINK`), exposed directly to Finder/Terminal via FSKit.
            * **Dirty Volume Mount Recovery**: Automatically runs `ntfsfix -d` if mounting fails due to dirty flags or hibernated logs, ensuring transparent read-write access.
            * **FSKit Disk Utility Integration**: Conforms to FSKit's `FSManageableResourceMaintenanceOperations` to support system-triggered check (fsck) and formatting (newfs).
            * **Automated CI/CD**: Pre-compiled package (`NTFSMagic.pkg`) attached automatically.
            
            ### ⚠️ Installation Notes
            Without a paid Apple Developer ID signature, macOS's security manager (`fskitd`) will reject loading the FSKit extension. To use this release system-wide:
            1. Boot into Recovery Mode and run `csrutil disable` to disable SIP.
            2. Install the `NTFSMagic.pkg` and open `/Applications/NTFSMagic.app` to register.
            
            Alternatively, you can run the helper daemon manually in CLI-only mode without disabling SIP:
            `sudo /Library/PrivilegedHelperTools/ntfsmagicd`
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
